<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="Tic-Tac-Toe.js" defer></script>
</head>
<body>
    
    <div id="questions">
        <div id="form">
            <div class="grid">
                <p id="grid3"><button>Gird 3 * 3</button></p>
                <p id="grid4"><button>Grid 4 * 4</button></p>
            </div>
            
            <div class="players">
                <p><label for="name">Name:</label>
                    <input type="text" id="name" class="playerName" required />
                </p>
                <p id="player1"><button>player 1</button></p>
                <p id="player2"><button>Player 2</button></p>
            </div>

            <p id="start"><button>Start Game</button></p>
        </div>
    </div>

    <div id="DivBoard"></div>

</body>
</html>
